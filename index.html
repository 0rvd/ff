<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جيراني - الدخول الآمن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top left, #1e1b4b 0%, #0f172a 40%, #020617 100%);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --surface: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-main);
            overflow: hidden;
        }

        /* تأثير إضاءة خلفية نيون */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: #3b82f6;
            filter: blur(150px);
            opacity: 0.15;
            top: 10%;
            left: 10%;
            z-index: 0;
        }

        .auth-container {
            position: relative;
            z-index: 1;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px 35px;
            border-radius: 30px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #3b82f6, var(--primary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #020617;
            margin: 0 auto 15px;
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .brand-header h1 {
            font-size: 26px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to left, #fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 5px 0 0;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            transition: 0.3s;
        }

        input, select {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: rgba(2, 6, 23, 0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(2, 6, 23, 0.6);
        }

        input:focus + i {
            color: var(--primary);
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, #0284c7 100%);
            border: none;
            border-radius: 16px;
            color: #020617;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
            filter: brightness(1.1);
        }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .toggle-link span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- الواجهة العلوية الموحدة -->
        <div class="brand-header">
            <div class="brand-logo"><i class="fas fa-users-viewfinder"></i></div>
            <h1>جـيـراني • Jirane</h1>
            <p id="brandSub">منصتك الحية للتكافل والخدمات السريعة</p>
        </div>

        <!-- صندوق تسجيل الدخول -->
        <div id="loginBox">
            <div class="input-group">
                <input type="text" id="user" placeholder="اسم المستخدم">
                <i class="fas fa-user-tag"></i>
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="كلمة المرور">
                <i class="fas fa-lock"></i>
            </div>
            
            <div class="flex-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe">
                    <span>تذكرني على هذا الجهاز</span>
                </label>
            </div>

            <button class="btn-submit" onclick="login()">دخول آمن</button>
            <div class="toggle-link">ليس لديك حساب؟ <span onclick="toggleView('signupBox')">سجل الآن</span></div>
        </div>

        <!-- صندوق إنشاء الحساب الجديد -->
        <div id="signupBox" class="hidden">
            <div class="input-group">
                <input type="text" id="regName" placeholder="الاسم الكامل">
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني (Gmail / Hotmail)">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="tel" id="regPhone" placeholder="رقم الجوال (10 أرقام)">
                <i class="fas fa-phone"></i>
            </div>
            <div class="input-group">
                <select id="regArea">
                    <option value="">اختر حيك السكني</option>
                    <option value="الروضة">حي الروضة</option>
                    <option value="السلامة">حي السلامة</option>
                    <option value="الفيصلية">حي الفيصلية</option>
                    <option value="النعيم">حي النعيم</option>
                    <option value="المرجان">حي المرجان</option>
                </select>
                <i class="fas fa-map-marked-alt" style="left: auto; right: 16px;"></i>
            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="كلمة المرور المشفرة">
                <i class="fas fa-key"></i>
            </div>
            <button class="btn-submit" onclick="register()">إنشاء الحساب وانضمام للحي</button>
            <div class="toggle-link">مسجل مسبقاً؟ <span onclick="toggleView('loginBox')">تسجيل دخول</span></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fdmzvtypxfoexjcwfnzq.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_ZS0QXq2GkYayJ5abz8vLfg_YSFqKAhi';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = function() {
            if (localStorage.getItem('rememberedUser')) {
                document.getElementById('user').value = localStorage.getItem('rememberedUser');
                document.getElementById('pass').value = localStorage.getItem('rememberedPass');
                document.getElementById('rememberMe').checked = true;
            }
        }

        function toggleView(id) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('signupBox').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('brandSub').innerText = id === 'signupBox' ? 'انضم إلى شبكة جيرانك الرقمية الآن' : 'منصتك الحية للتكافل والخدمات السريعة';
        }

        async function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const remember = document.getElementById('rememberMe').checked;

            if(!u || !p) { alert("أدخل البيانات كاملة المتبقية"); return; }
            const userSlug = u.toLowerCase().replace(/\s+/g, '');

            const { data, error } = await _supabase
                .from('users')
                .select('*')
                .eq('username', userSlug)
                .eq('password', p)
                .maybeSingle();

            if (error || !data) {
                alert("خطأ في بيانات الدخول، تأكد من المدخلات");
            } else {
                localStorage.setItem('isAuth', 'true');
                localStorage.setItem('username', data.full_name);
                localStorage.setItem('userNeighborhood', data.neighborhood);
                
                const dbArea = data.neighborhood ? data.neighborhood.trim().toLowerCase() : '';
                if(dbArea === 'ادمن' || dbArea === 'admin') {
                    localStorage.setItem('isAdmin', 'true');
                } else {
                    localStorage.setItem('isAdmin', 'false');
                }

                if (remember) {
                    localStorage.setItem('rememberedUser', u);
                    localStorage.setItem('rememberedPass', p);
                } else {
                    localStorage.removeItem('rememberedUser');
                    localStorage.removeItem('rememberedPass');
                }
                
                window.location.href = 'Chat_neighborhood.html';
            }
        }

        async function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const phone = document.getElementById('regPhone').value.trim();
            const area = document.getElementById('regArea').value;
            const pass = document.getElementById('regPass').value;

            if(!name || !email || !phone || !area || !pass) { alert("عبئ جميع الخانات المطلوبة"); return; }

            const emailPattern = /^[a-z0-9._%+-]+@(gmail\.com|hotmail\.com)$/;
            if(!emailPattern.test(email)) { alert("يجب التسجيل ببريد Gmail أو Hotmail فقط!"); return; }

            const phonePattern = /^\d{10}$/;
            if(!phonePattern.test(phone)) { alert("يجب أن يتكون رقم الجوال من 10 أرقام بالضبط!"); return; }

            const userSlug = name.toLowerCase().replace(/\s+/g, '');

            const { error } = await _supabase
                .from('users')
                .insert([{ username: userSlug, full_name: name, email: email, phone: phone, neighborhood: area, password: pass }]);

            if(error) {
                alert("خطأ أثناء التسجيل: " + error.message);
            } else {
                alert(`تم إنشاء حسابك بنجاح جاري!\nاسم المستخدم للدخول: ${userSlug}`);
                toggleView('loginBox');
                document.getElementById('user').value = userSlug;
            }
        }
    </script>
</body>
</html>
